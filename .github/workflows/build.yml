name: Build JCL

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project sources
        uses: actions/checkout@v6
        with:
          # Disabling shallow clone is recommended for improving the relevancy of reporting
          fetch-depth: 0
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          cache-disabled: true
      - name: Display Gradle, JVM, and other versions
        run: ./gradlew --version
      - name: Run Build with Gradle Wrapper
        run: ./gradlew build
      - name: Upload CodeCov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }} # Generate a token on Codecov.io, add it to the secrets of this repo with the name CODECOV_TOKEN (Settings > Secrets > Actions > add new repository secret)